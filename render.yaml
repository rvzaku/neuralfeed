# Render free-tier deployment (backend). Frontend deploys to Vercel with
# NEXT_PUBLIC_API_URL pointed at this service's URL.
# Free tier has no persistent disk — use a free Neon Postgres for durable data:
# set DATABASE_URL in the dashboard to
#   postgresql+asyncpg://USER:PASS@HOST/db?ssl=require
# Without it, the service falls back to ephemeral SQLite (data resets on
# deploys/restarts — fine for a quick trial, not for daily use).
# Free instances sleep after ~15 min idle — add a cron-job.org ping to /health
# every 10 minutes to keep the scheduler alive.
services:
  - type: web
    name: neuralfeed-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install --upgrade pip && pip install .
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"  # prebuilt wheels for lxml/pydantic — avoids slow source builds
      - key: DATABASE_URL
        sync: false  # paste your Neon connection string in the dashboard
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: SUMMARY_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false  # set in the Render dashboard, never committed
      - key: JWT_SECRET
        generateValue: true  # Render generates a strong secret on first deploy
      - key: AUTH_REQUIRED
        value: "false"  # flip to "true" once accounts are created
      - key: REDDIT_USER_AGENT
        value: NeuralFeed/0.1 (personal)
      - key: CORS_ORIGINS
        value: '["http://localhost:3000"]'  # add your Vercel URL after first deploy
