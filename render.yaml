# Render free-tier deployment (backend). Frontend deploys to Vercel with
# NEXT_PUBLIC_API_URL pointed at this service's URL.
# Free tier has no persistent disk — use a free Neon Postgres for durable data:
# set DATABASE_URL in the dashboard to
#   postgresql+asyncpg://USER:PASS@HOST/db?ssl=require
# Without it, the service falls back to ephemeral SQLite (data resets on
# deploys/restarts — fine for a quick trial, not for daily use).
# Free instances sleep after ~15 min idle — add a cron-job.org ping to /health
# every 10 minutes to keep the scheduler alive.
services:
  - type: web
    name: neuralfeed-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install --upgrade pip && pip install .
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"  # prebuilt wheels for lxml/pydantic — avoids slow source builds
      - key: DATABASE_URL
        sync: false  # paste your Neon connection string in the dashboard
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: REFRESH_MAX_HOURS
        value: "2"  # every source re-fetched at least this often (lower = fresher)
      - key: SUMMARY_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false  # set in the Render dashboard, never committed
      - key: JWT_SECRET
        generateValue: true  # Render generates a strong secret on first deploy
      - key: AUTH_REQUIRED
        value: "false"  # flip to "true" once accounts are created
      - key: SENTRY_DSN
        sync: false  # optional: paste a free sentry.io DSN to enable error monitoring
      - key: ALLOW_REGISTRATION
        value: "true"  # set "false" after creating your account to close signup
      - key: REDDIT_USER_AGENT
        value: NeuralFeed/0.1 (personal)
      - key: CORS_ORIGINS
        value: '["http://localhost:3000","https://neuralfeed.vercel.app"]'
      # Feed ranked-order cache, wired from the Key Value instance below so the
      # feed stops recomputing the ranking pipeline on every paginated request.
      # If REDIS_URL is ever unset, app/core/cache.py degrades to a no-op (the
      # feed just recomputes) — it never breaks the service.
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: neuralfeed-cache
          property: connectionString

  # Managed Redis (Render "Key Value") — a ~45s throwaway cache, NOT a datastore,
  # so the free plan's small size and eviction are fine. allkeys-lru drops the
  # oldest keys under memory pressure instead of erroring; an empty ipAllowList
  # keeps it reachable only from inside Render's private network (the API uses
  # the internal connectionString — no public exposure).
  - type: keyvalue
    name: neuralfeed-cache
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
