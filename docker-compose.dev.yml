# Redis is OPTIONAL for local dev as of the APScheduler migration —
# scheduled fetching now runs inside the FastAPI process.
# Keep this only if you want to develop against the legacy Celery workers
# (Phase 3 scale-up path): `docker compose -f docker-compose.dev.yml up redis`.
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
